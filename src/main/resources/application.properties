spring.application.name=transaction-reconciliation

# Enable virtual threads for Tomcat HTTP request handling (Java 21)
# This lets hundreds of upload requests be handled concurrently without
# exhausting platform threads. File processing still uses the bounded
# 5-thread platform pool (AsyncConfig) to control memory.
spring.threads.virtual.enabled=true

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/reconciliation?rewriteBatchedStatements=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.sql.init.mode=always

# HikariCP connection pool (sized for concurrent file processors + web threads)
spring.datasource.hikari.maximum-pool-size=20

# Kafka Producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Producer Tuning (high throughput for bulk processing)
spring.kafka.producer.properties.batch.size=65536
spring.kafka.producer.properties.linger.ms=50
spring.kafka.producer.properties.buffer.memory=134217728
spring.kafka.producer.properties.compression.type=lz4

# Kafka Consumer Tuning (high throughput batch processing)
spring.kafka.consumer.group-id=reconciliation-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=5000
spring.kafka.listener.type=batch
spring.kafka.listener.concurrency=20

# Multipart file upload limits (large XLSX files)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Temp file storage for queued uploads
file.upload.temp-dir=${java.io.tmpdir}/reconciliation-uploads

# File processing thread pool
file.processing.pool.core-size=5
file.processing.pool.max-size=5
file.processing.pool.queue-capacity=500
